<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="M4RC10 — Catálogo de música eletrônica autoral de @m4arc10c4mp0s" />
  <title>M4RC10 — Arquivo Eletrônico | triadic.life</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="https://triadic.life" class="back-link">← triadic.life</a>
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">M4RC10</span>
      <span class="logo-sub">@m4arc10c4mp0s · arquivo eletrônico</span>
    </div>
    <div class="header-meta" id="header-meta">carregando...</div>
  </header>

  <!-- Arc Navigation -->
  <nav class="arc-nav" id="arc-nav">
    <!-- populated by JS -->
  </nav>

  <!-- Main -->
  <main class="main-layout">

    <!-- Track List Panel -->
    <aside class="track-panel" id="track-panel">
      <div class="panel-header">
        <div class="panel-arc-name" id="panel-arc-name">Selecione um arco</div>
        <div class="panel-count" id="panel-count"></div>
      </div>
      <div class="volume-nav" id="volume-nav"></div>
      <div class="track-list" id="track-list">
        <div class="empty-state">← Escolha um arco acima</div>
      </div>
    </aside>

    <!-- Player Center -->
    <section class="player-section">
      <!-- Cover -->
      <div class="cover-wrap">
        <div class="cover-bg" id="cover-bg"></div>
        <img class="cover-img" id="cover-img" src="" alt="" />
        <div class="cover-overlay"></div>
        <div class="play-pulse" id="play-pulse"></div>
      </div>

      <!-- Track Info -->
      <div class="now-playing" id="now-playing">
        <div class="np-arc" id="np-arc">—</div>
        <div class="np-title" id="np-title">Selecione uma música</div>
        <div class="np-caption" id="np-caption"></div>
        <div class="np-meta" id="np-meta"></div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <span class="time" id="time-cur">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time" id="time-dur">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="btn-prev" title="Anterior">⏮</button>
        <button class="ctrl-btn btn-play" id="btn-play" title="Play">▶</button>
        <button class="ctrl-btn" id="btn-next" title="Próximo">⏭</button>
        <button class="ctrl-btn ctrl-sm" id="btn-shuffle" title="Shuffle">⇄</button>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <span>🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.02" value="0.8" class="vol-slider"/>
      </div>
    </section>

  </main>

  <!-- Hidden audio -->
  <audio id="audio" crossorigin="anonymous" preload="metadata"></audio>

  <script src="app.js"></script>
  <script src="visualizer.js"></script>
</body>
</html>
