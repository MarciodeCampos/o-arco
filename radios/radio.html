<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Rádio | triadic.life</title>
<meta name="description" content="Ouça e bate-papo ao vivo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d0e1a;color:#e2e8f0;min-height:100vh}
header{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 24px;display:flex;align-items:center;gap:12px}
header a{color:#94a3b8;text-decoration:none;font-size:.9rem}
header a:hover{color:#a78bfa}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 40px}
.glass{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px;margin-bottom:20px}
.radio-header{display:flex;align-items:center;gap:18px}
.logo-img{width:80px;height:80px;border-radius:12px;object-fit:cover;border:2px solid rgba(255,255,255,.1)}
.logo-placeholder{width:80px;height:80px;border-radius:12px;background:linear-gradient(135deg,#7c6ef7,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:2.2rem;flex-shrink:0}
h1{font-size:1.8rem;color:#f1f5f9;margin-bottom:6px}
.sub{color:#94a3b8;font-size:.95rem}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:20px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;font-size:.95rem;font-weight:600;cursor:pointer;padding:10px 18px;margin-bottom:-1px;transition:all .2s;font-family:inherit}
.tab:hover{color:#e2e8f0}
.tab.on{color:#a78bfa;border-bottom-color:#a78bfa}
.pane{display:none} .pane.on{display:block}
audio{width:100%;border-radius:8px;margin-top:8px;outline:none}
.ok{color:#4CAF50;font-size:.9rem}
.contact-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.03);padding:14px;border-radius:8px;margin-bottom:10px}
.contact-label{display:flex;align-items:center;gap:10px}
.btn{padding:6px 14px;border-radius:6px;text-decoration:none;font-size:.85rem;font-weight:600;color:#fff}
/* CHAT */
.chat-nick{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.chat-nick label{color:#94a3b8;font-size:.85rem;white-space:nowrap}
.chat-nick input,.chat-box-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;padding:8px 12px;outline:none;font-family:inherit}
.chat-nick input{flex:1}
.chat-nick input:focus,.chat-box-input:focus{border-color:#7c6ef7}
#chat-msgs{height:350px;overflow-y:auto;background:rgba(0,0,0,.3);border-radius:10px;border:1px solid rgba(255,255,255,.08);padding:14px;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;scroll-behavior:smooth}
#chat-msgs::-webkit-scrollbar{width:4px}
#chat-msgs::-webkit-scrollbar-thumb{background:#3a3d50;border-radius:4px}
.bubble{background:rgba(124,110,247,.1);border-left:3px solid #7c6ef7;border-radius:8px;padding:10px 14px;animation:fadeUp .2s ease}
.bubble.alt{border-left-color:#a78bfa}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.bubble-head{display:flex;justify-content:space-between;margin-bottom:4px}
.bubble-nick{color:#c4b5fd;font-weight:700;font-size:.85rem}
.bubble-time{color:#64748b;font-size:.72rem}
.bubble-text{font-size:.92rem;line-height:1.5}
.msg-actions{display:flex;justify-content:flex-end;margin-top:4px;opacity:.45;transition:opacity .2s}
.bubble:hover .msg-actions{opacity:1}
.share-msg-btn{background:none;border:none;cursor:pointer;color:#64748b;font-size:.75rem;padding:2px 5px;border-radius:4px;transition:all .15s;font-family:inherit}
.share-msg-btn:hover{color:#a78bfa;background:rgba(167,139,250,.1)}
.bubble.highlight{animation:highlight 2s ease;}
@keyframes highlight{0%,100%{background:rgba(124,110,247,.1)}50%{background:rgba(124,110,247,.35)}}
.bubble.new-msg{animation:newFlash 2s ease;}
@keyframes newFlash{0%{background:rgba(167,139,250,.35);border-left-color:#fff}100%{background:rgba(124,110,247,.1);border-left-color:#7c6ef7}}
.ver-mais-btn{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:8px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .2s;margin-top:8px;display:block;text-align:center}
.ver-mais-btn:hover{background:rgba(124,110,247,.1);border-color:#7c6ef7;color:#a78bfa}
.chat-input-row{display:flex;gap:8px;position:sticky;top:0;z-index:5;background:#0d0e1a;padding-bottom:8px;padding-top:4px}
.chat-box-input{flex:1;font-size:.92rem}
#chat-send{background:linear-gradient(135deg,#7c6ef7,#a78bfa);border:none;border-radius:8px;color:#fff;padding:10px 20px;cursor:pointer;font-weight:700;font-size:.9rem;font-family:inherit;white-space:nowrap;transition:opacity .2s}
#chat-send:hover{opacity:.85}
#chat-send:disabled{opacity:.5;cursor:not-allowed}
#chat-status{font-size:.78rem;color:#64748b;margin-top:6px;min-height:16px}
.live-dot{display:inline-block;width:8px;height:8px;background:#4CAF50;border-radius:50%;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.empty-chat{color:#64748b;text-align:center;font-size:.85rem;margin:auto}
/* INBOX BADGE */
.inbox-icon{position:relative;cursor:pointer;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#e2e8f0;font-size:1.1rem;transition:background .2s;margin-left:auto;text-decoration:none;display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;font-family:inherit}
.inbox-icon:hover{background:rgba(124,110,247,.15);border-color:#7c6ef7}
#inbox-unread{position:absolute;top:-6px;right:-6px;background:#ef5350;color:#fff;font-size:.65rem;font-weight:700;padding:2px 5px;border-radius:99px;display:none;min-width:18px;text-align:center}

/* MIC BUTTON */
#mic-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;
  color:#e2e8f0;padding:10px 14px;cursor:pointer;font-size:1.1rem;transition:all .2s;font-family:inherit}
#mic-btn:hover{border-color:#7c6ef7}
#mic-btn.recording{background:rgba(239,83,80,.2);border-color:#ef5350;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,83,80,.4)}50%{box-shadow:0 0 0 6px rgba(239,83,80,0)}}
.bubble-audio audio{width:100%;margin-top:6px;height:36px;border-radius:6px}
.bubble-audio .bubble-type{font-size:.72rem;color:#a78bfa;margin-bottom:2px}

/* SHARE + VOLUME */
.share-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.share-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:opacity .2s}
.share-btn:hover{opacity:.85}
.share-copy{background:rgba(255,255,255,.1);color:#e2e8f0}
.share-wpp{background:#25D366;color:#fff}
.vol-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.vol-row label{font-size:.8rem;color:#94a3b8;white-space:nowrap;min-width:70px}
input[type=range].vol{-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;flex:1;min-width:80px}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#7c6ef7;cursor:pointer}
.vol-val{font-size:.78rem;color:#64748b;width:30px;text-align:right}
.copied-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid #7c6ef7;color:#a78bfa;padding:10px 20px;border-radius:10px;font-size:.88rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.copied-toast.show{opacity:1}
/* MOBILE - botao enviar sempre visivel */
@media(max-width:520px){
  .chat-input-row{flex-wrap:wrap}
  .chat-box-input{width:100%;flex:none;border-radius:8px!important}
  #mic-btn{flex:1;justify-content:center}
  #chat-send{flex:2;justify-content:center;padding:12px 0}
  #chat-send,#mic-btn{border-radius:8px!important}
}

/* AUTH */
.auth-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px;margin-bottom:12px;flex-wrap:wrap}
.auth-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #7c6ef7;flex-shrink:0}
.auth-avatar-anon{width:32px;height:32px;border-radius:50%;background:rgba(124,110,247,.2);border:2px solid rgba(124,110,247,.4);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.auth-name{flex:1;font-size:.88rem;color:#e2e8f0;font-weight:600}
.badge-verified{font-size:.68rem;background:rgba(76,175,80,.15);color:#4CAF50;border:1px solid rgba(76,175,80,.4);border-radius:20px;padding:2px 7px;margin-left:4px}
.badge-anon{font-size:.68rem;background:rgba(255,255,255,.08);color:#94a3b8;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2px 7px;margin-left:4px}
.btn-google{display:flex;align-items:center;gap:7px;background:#fff;color:#333;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.82rem;font-weight:700;font-family:inherit;transition:opacity .2s}
.btn-google:hover{opacity:.88}
.btn-google img{width:16px;height:16px}
.btn-logout{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s}
.btn-logout:hover{border-color:#ef5350;color:#ef5350}
.bubble-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle;margin-right:4px}
/* PRESENCA ONLINE */
.online-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(76,175,80,.06);border:1px solid rgba(76,175,80,.15);border-radius:10px;margin-bottom:14px;flex-wrap:wrap}
.online-count{font-size:1.1rem;font-weight:700;color:#4CAF50}
.online-label{font-size:.82rem;color:#94a3b8}
.online-avatars{display:flex;gap:-6px;margin-left:auto}
.online-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #0d0e1a;margin-left:-6px;background:rgba(124,110,247,.3);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.online-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
/* SIDEBAR */
.chat-layout{display:flex;gap:14px;align-items:flex-start}
.chat-main{flex:1;min-width:0}
.chat-sidebar{width:200px;flex-shrink:0;background:#13131f;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
.sidebar-header{font-size:.82rem;font-weight:700;color:#8affc1;margin-bottom:10px;display:flex;align-items:center;gap:6px}
#sidebar-users{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.sidebar-user{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .2s}
.sidebar-user:hover{background:rgba(255,255,255,.07)}
.sidebar-user img,.sidebar-user .su-av{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(124,110,247,.3);display:flex;align-items:center;justify-content:center;font-size:.85rem}
.sidebar-user span{font-size:.8rem;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.sidebar-user .su-me{font-size:.65rem;color:#64748b;display:block}
@media(max-width:600px){.chat-layout{flex-direction:column}.chat-sidebar{width:100%;max-height:120px}.#sidebar-users{flex-direction:row;flex-wrap:wrap;max-height:80px}}
/* DM OVERLAY PANEL */
#dm-panel{position:fixed;right:0;top:0;height:100%;width:340px;max-width:95vw;background:#0f0f1c;border-left:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;z-index:1000;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.5)}
#dm-panel.open{transform:translateX(0)}
.dm-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.dm-back{background:none;border:none;color:#a78bfa;cursor:pointer;font-size:1.2rem;padding:4px 8px;border-radius:6px;transition:background .2s}
.dm-back:hover{background:rgba(167,139,250,.1)}
.dm-av{width:32px;height:32px;border-radius:50%;background:rgba(124,110,247,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.dm-av img{width:100%;height:100%;object-fit:cover}
.dm-title{font-weight:700;font-size:.95rem;flex:1}
.dm-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.dm-msgs::-webkit-scrollbar{width:3px}
.dm-msgs::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:3px}
.dm-bubble{max-width:80%;padding:8px 12px;border-radius:12px;font-size:.88rem;line-height:1.45;word-break:break-word;animation:fadeUp .15s ease}
.dm-bubble.me{background:linear-gradient(135deg,#7c6ef7,#a78bfa);color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.dm-bubble.other{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:3px}
.dm-bubble audio{width:100%;margin-top:4px;height:32px;border-radius:4px}
.dm-time{font-size:.62rem;opacity:.55;margin-top:3px;text-align:right}
.dm-bubble.other .dm-time{text-align:left}
.dm-typing{padding:2px 14px;font-size:.72rem;color:#7c6ef7;font-style:italic;min-height:18px;flex-shrink:0}
.dm-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.dm-input-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e2e8f0;padding:8px 12px;outline:none;font-family:inherit;font-size:.88rem}
.dm-input-row input:focus{border-color:#7c6ef7}
#dm-mic{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e2e8f0;padding:8px 10px;cursor:pointer;font-size:1rem;transition:all .2s;user-select:none}
#dm-mic.recording{background:rgba(239,83,80,.2);border-color:#ef5350;animation:recPulse 1s infinite}
#dm-send{background:linear-gradient(135deg,#7c6ef7,#a78bfa);border:none;border-radius:8px;color:#fff;padding:8px 14px;cursor:pointer;font-weight:700;font-size:.85rem;font-family:inherit}
#dm-send:disabled{opacity:.4}
#dm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:none}
#dm-overlay.show{display:block}
</style>
</head>
<body>
<header>
  <a href="index.html">← Rádios</a>
  <span style="color:#3a3d50">|</span>
  <span id="header-nome" style="color:#e2e8f0;font-weight:600"></span>
  <a class="inbox-icon" onclick="window.openInboxPage()" style="cursor:pointer" id="inbox-btn" title="Mensagens privadas">
    💬 DMs
    <span id="inbox-unread">0</span>
  </a>
</header>
<div id="dm-overlay" onclick="window.closeDMPanel()"></div>
<!-- DM OVERLAY PANEL -->
<div id="dm-panel">
  <div class="dm-header">
    <button class="dm-back" onclick="window.closeDMPanel()">←</button>
    <div class="dm-av" id="dm-av">👤</div>
    <div class="dm-title" id="dm-name">Usuário</div>
    <a href="inbox.html" style="font-size:.72rem;color:#64748b;text-decoration:none;margin-left:auto">📥 inbox</a>
  </div>
  <div class="dm-msgs" id="dm-msgs"></div>
  <div class="dm-typing" id="dm-typing"></div>
  <div class="dm-input-row">
    <input id="dm-input" type="text" maxlength="500" placeholder="Mensagem privada...">
    <button id="dm-mic" title="Segurar para gravar">🎤</button>
    <button id="dm-send" onclick="window.sendDMPanel()">&#10148;</button>
  </div>
</div>
<div class="copied-toast" id="toast">Link copiado!</div>
<div class="wrap">
  <!-- Cabeçalho da rádio -->
  <div class="glass">
    <div class="radio-header">
      <div id="logo-wrap"><div class="logo-placeholder">📻</div></div>
      <div>
        <h1 id="radio-nome">Carregando...</h1>
        <div class="sub" id="radio-loc"></div>
      </div>
    </div>
  </div>
  <!-- Abas -->
  <div class="tabs">
    <button class="tab on" data-pane="p-player">Ao vivo</button>
    <button class="tab" data-pane="p-chat">💬 Bate-Papo</button>
    <button class="tab" data-pane="p-contatos">Contatos</button>
  </div>
  <!-- Player -->
  <div id="p-player" class="pane on">
    <div class="glass">
      <div id="player-area" style="text-align:center;padding:16px 0">
        <div style="color:#7c6ef7;font-style:italic">Conectando ao áudio...</div>
      </div>
    </div>

    <!-- Volume controles -->
    <div class="vol-row" id="vol-controls" style="display:none">
      <label>📻 Rádio</label>
      <input type="range" class="vol" id="vol-radio" min="0" max="100" value="80">
      <span class="vol-val" id="vol-radio-val">80%</span>
    </div>
    <div class="vol-row" id="vol-voice-row" style="display:none">
      <label>🎤 Vozes</label>
      <input type="range" class="vol" id="vol-voice" min="0" max="100" value="100">
      <span class="vol-val" id="vol-voice-val">100%</span>
    </div>
    <!-- Compartilhar -->
    <div class="share-bar">
      <span style="font-size:.82rem;color:#64748b;">Compartilhar canal:</span>
      <button class="share-btn share-copy" onclick="shareChat('copy')">📋 Copiar link</button>
      <button class="share-btn share-wpp"  onclick="shareChat('wpp')">💬 WhatsApp</button>
    </div>

  </div>
  <!-- Chat -->
  <div id="p-chat" class="pane">
    <div class="glass">
      <!-- Presença online -->
      <div class="online-bar" id="online-bar">
        <span class="live-dot"></span>
        <span class="online-count" id="online-count">0</span>
        <span class="online-label">ouvintes online</span>
        <div class="online-avatars" id="online-avatars"></div>
      </div>
      <div class="chat-layout">
        <!-- CHAT MAIN -->
        <div class="chat-main">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <strong style="font-size:1.1rem">💬 Bate-Papo ao Vivo</strong>
            <div style="display:flex;align-items:center;gap:10px">
              <button onclick="window.shareChatChannel()" style="background:rgba(124,110,247,.15);border:1px solid rgba(124,110,247,.3);color:#a78bfa;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.78rem;font-weight:600;font-family:inherit;transition:all .2s" onmouseover="this.style.background='rgba(124,110,247,.3)'" onmouseout="this.style.background='rgba(124,110,247,.15)'">🔗 Compartilhar</button>
              <span style="font-size:.8rem;color:#4CAF50"><span class="live-dot"></span>Tempo real</span>
            </div>
          </div>
          <!-- Auth bar -->
          <div class="auth-bar" id="auth-bar">
            <div class="auth-avatar-anon" id="auth-avatar-wrap">👤</div>
            <div>
              <span class="auth-name" id="auth-display-name">Entrando...</span>
              <span id="auth-badge" class="badge-anon">anônimo</span>
            </div>
            <button class="btn-google" id="btn-google-login" onclick="loginGoogle()" style="margin-left:auto;display:none">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
              Entrar com Google
            </button>
            <button class="btn-logout" id="btn-logout" onclick="logoutUser()" style="display:none">Sair</button>
          </div>
          <!-- Apelido (so para anonimos) -->
          <div class="chat-nick" id="nick-row">
            <label>🎙️ Apelido:</label>
            <input id="chat-nick" type="text" maxlength="30" placeholder="Seu apelido...">
          </div>
          <!-- Input ACIMA do historico -->
          <div class="chat-input-row">
            <input id="chat-input" class="chat-box-input" type="text" maxlength="500" placeholder="Digite sua mensagem...">
            <button id="mic-btn" title="Gravar mensagem de voz" onclick="toggleMic()">🎤</button>
            <button id="chat-send" onclick="sendMsg()">Enviar ➤</button>
          </div>
          <div id="mic-status" style="font-size:.78rem;color:#64748b;margin-top:4px;min-height:14px;"></div>
          <div id="chat-status"></div>
          <!-- Feed invertido: novas mensagens no topo -->
          <div id="chat-msgs"><div class="empty-chat">📻 Seja o primeiro a comentar!</div></div>
        </div>

async function loadRadio(){

    const audio = document.getElementById('radio-audio');
    if(r.stream.includes('.m3u8')){
      if(typeof Hls !== 'undefined' && Hls.isSupported()){
        const hls = new Hls(); hls.loadSource(r.stream); hls.attachMedia(audio);
      } else if(audio.canPlayType('application/vnd.apple.mpegurl')){ audio.src=r.stream; }

      +'<iframe src="https://www.radios.com.br/play/'+radioId+'" width="100%" height="200" frameborder="0" style="border-radius:8px"></iframe>';

function contactRow(icon, label, href, color){

}

// ── CHAT FIREBASE ──
const NICK_KEY = 'spes_chat_nick';
let lastCount = 0;
const LIMIT_INITIAL = 20;
let _seenKeys = new Set();
let _showAll  = false;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(ts){ return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function renderMsgs(msgs){
  try{
    const box = document.getElementById('chat-msgs');
    if(!box){ console.warn('[chat] #chat-msgs nao encontrado'); return; }
    if(!msgs || !msgs.length){ box.innerHTML='<div class="empty-chat">📻 Seja o primeiro a comentar!</div>'; return; }
    const sorted = [...msgs].sort((a,b)=>(b.ts||0)-(a.ts||0));
    const total  = sorted.length;
    const visible = _showAll ? sorted : sorted.slice(0, LIMIT_INITIAL);
    box.innerHTML = visible.map((m,i)=>{
      const key = m._key || i;
      const isNew = !_seenKeys.has(key) && _seenKeys.size > 0;
      const avatarHtml = m.photo ? `<img class="bubble-avatar" src="${m.photo}" alt="">` : '🎙️ ';
      const verifiedBadge = m.verified ? '<span class="badge-verified" style="font-size:.65rem;padding:1px 5px">✓</span>' : '';
      const head = `<div class="bubble-head"><span class="bubble-nick">${avatarHtml}${esc(m.apelido||'?')}${verifiedBadge}</span><span class="bubble-time">${m.ts?fmt(m.ts):''}</span></div>`;
      const body = m.tipo === 'audio'
        ? `<div class="bubble-type">🎤 Mensagem de voz</div><audio controls src="${m.audioUrl||''}" preload="none"></audio>`
        : `<div class="bubble-text">${esc(m.mensagem||'')}</div>`;
      const safeApelido = (m.apelido||'').replace(/'/g,'&#39;');
      const safeMensagem = (m.mensagem||'').replace(/'/g,'&#39;');
      const actions = `<div class="msg-actions"><button class="share-msg-btn" onclick="window.shareMsg('${safeApelido}','${safeMensagem}','${key}')">🔗 compartilhar</button></div>`;
      return `<div class="bubble bubble-${m.tipo||'text'} ${i%2?'alt':''} ${isNew?'new-msg':''}" data-id="${key}">${head}${body}${actions}</div>`;
    }).join('');
    if(total > LIMIT_INITIAL){
      const btn = document.createElement('button');
      btn.className = 'ver-mais-btn';
      btn.textContent = _showAll ? '⬆️ Ver menos' : `📖 Ver histórico (${total - LIMIT_INITIAL} mensagens anteriores)`;
      btn.onclick = () => { _showAll = !_showAll; renderMsgs(window._lastMsgs || []); };
      box.appendChild(btn);
    }
    lastCount = msgs.length;
    msgs.forEach(m => { if(m._key) _seenKeys.add(m._key); });
    // Highlight por link direto - apenas uma vez
    if(!window._hashHighlightDone){
      const hashMsg = location.hash.startsWith('#msg=') ? location.hash.slice(5) : null;
      if(hashMsg){
        const el = box.querySelector(`[data-id="${hashMsg}"]`);
        if(el){ el.classList.add('highlight'); window._hashHighlightDone=true; }
      }
    }
  } catch(err){ console.error('[chat] renderMsgs erro:', err); }
}

// Listener principal - tempo real
const msgsPath = 'chats/' + radioId + '/msgs';
const chatRef  = ref(db, msgsPath);
onValue(chatRef, snap => {
  const data = snap.val();
  if(!data){ renderMsgs([]); window._lastMsgs=[]; return; }
  const msgs = Object.entries(data).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.ts||0)-(b.ts||0));
  window._lastMsgs = msgs;
  window._renderMsgs = renderMsgs;
  renderMsgs(msgs);
});

// Polling fallback a cada 3s
window.pollMsgs = async function(){
  try{
    const snap = await get(ref(db, msgsPath));
    const data = snap.val();
    if(!data){ return; }
    const msgs = Object.entries(data).map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.ts||0)-(b.ts||0));
    window._lastMsgs = msgs;
    window._renderMsgs = renderMsgs;
    renderMsgs(msgs);
  }catch(e){};
};
setInterval(window.pollMsgs, 3000);
window.pollMsgs();

// COMPARTILHAR MENSAGEM
window.shareMsg = function(apelido, mensagem, msgId){
  const id   = new URLSearchParams(location.search).get('id') || '';
  const nome = document.getElementById('radio-nome')?.textContent || 'Rádio';
  const url  = `${location.origin}${location.pathname}?id=${id}&open=chat#msg=${msgId}`;
  const text = `“${mensagem || '🎤 áudio'}” — ${apelido}\n\n📻 ${nome} ao vivo:\n${url}`;
  if(navigator.share){
    navigator.share({ title: nome, text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      const t = document.getElementById('toast');
      if(t){ t.textContent='Link copiado!'; t.classList.add('show'); setTimeout(()=>{t.textContent='Link copiado!';t.classList.remove('show');},2000); }
    });
  }
};

// Enviar mensagem
window.sendMsg = async function(){
  const nickEl  = document.getElementById('chat-nick');
  const inputEl = document.getElementById('chat-input');
  const statusEl= document.getElementById('chat-status');
  // Nome: Google > apelido digitado > 'Anonimo'

  const photo    = isGoogle ? currentUser.photoURL    : null;
  const msg      = inputEl?.value?.trim();
  if(!isGoogle && !nickEl?.value?.trim()){ if(statusEl){statusEl.textContent='⚠️ Informe seu apelido.';statusEl.style.color='#f39c12';} nickEl?.focus(); return; }
  if(!msg) return;
  localStorage.setItem(NICK_KEY, nick);
  const btn = document.getElementById('chat-send');
  if(btn) btn.disabled = true;
  try{
    await push(ref(db,'chats/'+radioId+'/msgs'), { apelido: nick.slice(0,30), mensagem: msg.slice(0,500), ts: Date.now(), photo: photo||'', verified: isGoogle });
    if(inputEl) inputEl.value='';
    if(statusEl) statusEl.textContent='';
  } catch(e){
    if(statusEl){statusEl.textContent='❌ Erro ao enviar.';statusEl.style.color='#ef5350';}
  } finally {
    if(btn) btn.disabled=false;
  }
};

// ── GRAVACAO DE VOZ ──────────────────────────────────────────────────────────
let mediaRec = null;
let audioChunks = [];
let isRecording = false;

window.toggleMic = async function(){
  const btn = document.getElementById('mic-btn');
  const st  = document.getElementById('mic-status');
  if(!isRecording){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRec = new MediaRecorder(stream);
      mediaRec.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRec.onstop = async () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        if(blob.size < 1000){ if(st) st.textContent='Gravacao muito curta.'; return; }
        const nick = document.getElementById('chat-nick')?.value?.trim();
        if(!nick){ if(st){st.textContent='⚠️ Informe seu apelido.';st.style.color='#f39c12';} return; }
        if(st) st.textContent = 'Enviando audio...';
        try{
          const fname = 'chats/'+radioId+'/'+Date.now()+'.webm';
          const storageRef = sref(storage, fname);
          await uploadBytes(storageRef, blob);
          const url = await getDownloadURL(storageRef);
          await push(ref(db,'chats/'+radioId+'/msgs'), { apelido:nick.slice(0,30), tipo:'audio', audioUrl:url, mensagem:'', ts:Date.now() });
          if(st) st.textContent = '';
        } catch(e){ if(st){st.textContent='Erro no upload.';st.style.color='#ef5350';} }
      };
      mediaRec.start();
      isRecording = true;
      if(btn){btn.textContent='⏹ Parar';btn.classList.add('recording');}
      if(st){st.textContent='● Gravando...';st.style.color='#ef5350';}
    } catch(e){
      if(st){st.textContent='Microfone nao permitido.';st.style.color='#f39c12';}
    }
  } else {
    mediaRec?.stop();
    isRecording = false;
    if(btn){btn.textContent='🎤';btn.classList.remove('recording');}
    if(st){st.textContent='Processando...';st.style.color='#94a3b8';}
  }
};

let _presenceRef = null;

onAuthStateChanged(auth, user => {
  // segundo listener: atualiza presenca quando auth muda
  if(!user || !radioId) return;
  if(_presenceRef) return; // ja registrado
  _presenceRef = ref(db, 'radioPresence/' + radioId + '/' + user.uid);

    uid:      user.uid,
    name:     user.displayName || (localStorage.getItem('spes_chat_nick') || 'Ouvinte'),
    photo:    user.photoURL    || '',
    online:   true,
    ts:       Date.now()
  };

    const users = {};

          : `<div class="online-avatar" title="${u.name||'Ouvinte'}">${(u.name||'?')[0].toUpperCase()}</div>`
      ).join('');
    }
    // sidebar
    const sbCount = document.getElementById('sidebar-count');
    const sbUsers = document.getElementById('sidebar-users');

      sbUsers.innerHTML = list.map(u => {

          ? `<img src="${u.photo}" alt="">`
          : `<div class="su-av">${(u.name||'?')[0].toUpperCase()}</div>`;
        return `<div class="sidebar-user" onclick="window.openDM('${u.uid}','${(u.name||'Ouvinte').replace(/'/g,'')}')">

  });
});

// DM OVERLAY PANEL
let _dmChatId = null, _dmWithUid = null, _dmWithName = null, _dmListener = null, _dmTypingListener = null;
let _dmRec = null, _dmChunks = [], _dmRecording = false;

function dmChatId(a,b){ return [a,b].sort().join('_'); }
function dmFmt(ts){ return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

window.openDM = function(uid, name, photo){
  if(!uid || uid === auth.currentUser?.uid) return;
  _dmWithUid  = uid;
  _dmWithName = name;
  _dmChatId   = dmChatId(auth.currentUser.uid, uid);
  document.getElementById('dm-name').textContent = name || 'Usuário';
  document.getElementById('dm-av').innerHTML = photo
    ? `<img src="${photo}" alt="">`
    : (name||'?')[0].toUpperCase();
  document.getElementById('dm-panel').classList.add('open');
  document.getElementById('dm-overlay').classList.add('show');
  // Marcar como lida
  set(ref(db, `userInbox/${auth.currentUser.uid}/${_dmChatId}/unread`), false).catch(()=>{});
  // Desconectar listener anterior
  if(_dmListener){ _dmListener(); _dmListener=null; }
  if(_dmTypingListener){ _dmTypingListener(); _dmTypingListener=null; }
  // Ouvir mensagens
  _dmListener = onValue(ref(db,`directChats/${_dmChatId}/messages`), snap=>{
    const data = snap.val()||{};
    const msgs = Object.values(data).sort((a,b)=>(a.ts||0)-(b.ts||0));
    const box  = document.getElementById('dm-msgs');
    box.innerHTML = msgs.map(m=>{
      const mine = m.from===auth.currentUser?.uid;
      const body = m.type==='audio'
        ? `<div style="font-size:.68rem;color:#c4b5fd;margin-bottom:2px">🎤 Áudio</div><audio controls src="${m.audioUrl}" preload="none"></audio>`
        : esc(m.text||'');
      return `<div class="dm-bubble ${mine?'me':'other'}">${body}<div class="dm-time">${m.ts?dmFmt(m.ts):''}</div></div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
  });
  // Typing indicator
  _dmTypingListener = onValue(ref(db,`typing/${_dmChatId}`), snap=>{
    const data = snap.val()||{};
    const typing = Object.keys(data).filter(u=>u!==auth.currentUser?.uid&&data[u]);
    const el = document.getElementById('dm-typing');
    if(el) el.textContent = typing.length ? '✍️ digitando...' : '';
  });
};

};

window.sendDMPanel = async function(){
  const inp = document.getElementById('dm-input');

  const btn = document.getElementById('dm-send');

  const me = auth.currentUser;

    await push(ref(db,`directChats/${_dmChatId}/messages`),{
      from:me.uid, fromName:me.displayName||'Usuário', to:_dmWithUid, text, ts:Date.now()
    });
    await set(ref(db,`userInbox/${me.uid}/${_dmChatId}`),{
      with:_dmWithUid,name:_dmWithName,photo:'',lastMessage:text,ts:Date.now()
    });
    await set(ref(db,`userInbox/${_dmWithUid}/${_dmChatId}`),{
      with:me.uid,name:me.displayName||'Usuário',photo:me.photoURL||'',lastMessage:text,ts:Date.now(),unread:true
    });
    inp.value='';
  }catch(e){console.error('sendDM',e);}
  finally{if(btn)btn.disabled=false;}
};

// Voice no DM panel
const dmMic=document.getElementById('dm-mic');
if(dmMic){
  const startDmRec=async()=>{

      const stream=await navigator.mediaDevices.getUserMedia({audio:true});

      _dmRec=new MediaRecorder(stream);

      _dmRec.onstop=async()=>{

        const blob=new Blob(_dmChunks,{type:'audio/webm'});
        if(blob.size<500){dmMic.textContent='🎤';return;}

        try{
          const st=getStorage(app);
          const fname=`dm/${_dmChatId}/${Date.now()}.webm`;
          const sr=sref(st,fname);
          await uploadBytes(sr,blob);
          const url=await getDownloadURL(sr);
          const me=auth.currentUser;
          await push(ref(db,`directChats/${_dmChatId}/messages`),{
            from:me.uid,fromName:me.displayName||'Usuário',to:_dmWithUid,type:'audio',audioUrl:url,ts:Date.now()
          });
          await set(ref(db,`userInbox/${me.uid}/${_dmChatId}`),{with:_dmWithUid,name:_dmWithName,photo:'',lastMessage:'🎤 Áudio',ts:Date.now()});
          await set(ref(db,`userInbox/${_dmWithUid}/${_dmChatId}`),{with:me.uid,name:me.displayName||'Usuário',photo:me.photoURL||'',lastMessage:'🎤 Áudio',ts:Date.now(),unread:true});
        }catch(e){console.error('dm audio',e);}
        dmMic.textContent='🎤';dmMic.classList.remove('recording');
      };
      _dmRec.start(); _dmRecording=true;
      dmMic.textContent='⏹';dmMic.classList.add('recording');
    }catch(e){dmMic.textContent='🎤';}
  };
  const stopDmRec=()=>{if(!_dmRecording)return;_dmRec?.stop();_dmRecording=false;};
  dmMic.addEventListener('mousedown',startDmRec);
  dmMic.addEventListener('mouseup',stopDmRec);
  dmMic.addEventListener('mouseleave',stopDmRec);
  dmMic.addEventListener('touchstart',e=>{e.preventDefault();startDmRec();});
  dmMic.addEventListener('touchend',e=>{e.preventDefault();stopDmRec();});
}

// Badge de nao lidas - ouvir inbox em tempo real
function watchUnread(uid){
  onValue(ref(db, 'userInbox/' + uid), snap => {
    const data = snap.val() || {};
    let count = 0;
    Object.values(data).forEach(ch => { if(ch.unread) count++; });
    const badge = document.getElementById('inbox-unread');
    if(badge){
      badge.textContent = count;
      badge.style.display = count > 0 ? 'block' : 'none';
    }
  });
}

<script>
// ── ABRIR CHAT VIA HASH ───────────────────────────────────────────────────
(function(){
  const qp = new URLSearchParams(location.search);
  const shouldOpen = location.hash === '#chat'
    || qp.get('open') === 'chat'
    || location.hash.startsWith('#msg=');
  if(shouldOpen){
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(pn=>pn.classList.remove('on'));
    const tabBtn = document.querySelector('[data-pane="p-chat"]');
    if(tabBtn) tabBtn.classList.add('on');
    const pane = document.getElementById('p-chat');
    if(pane) pane.classList.add('on');
    // Forca releitura imediata
    setTimeout(()=>{ if(window.pollMsgs) window.pollMsgs(); }, 300);
  }
})();

// ── COMPARTILHAR CANAL (botao fixo no header do chat) ─────────────────────
window.shareChatChannel = function(){
  var id   = new URLSearchParams(location.search).get('id') || '';
  var nome = (document.getElementById('radio-nome') || {}).textContent || 'Radio';
  var url  = location.origin + location.pathname + '?id=' + id + '&open=chat';
  var text = 'Radio ' + nome + ' - bate-papo ao vivo: ' + url;
  if(navigator.share){ navigator.share({title: nome, text: text}).catch(function(){}); }
  else { navigator.clipboard.writeText(url).then(function(){
    var t = document.getElementById('toast');
    if(t){t.textContent='Link do chat copiado!';t.classList.add('show');setTimeout(function(){t.textContent='Link copiado!';t.classList.remove('show');},2000);}
  }); }
};

window.shareChat = function(mode){
  const params = new URLSearchParams(location.search);
  const id     = params.get('id') || '';
  const nome   = document.getElementById('radio-nome')?.textContent || 'Rádio';
  const url    = location.origin + location.pathname + '?id=' + id + '#chat';
  const texto  = 'Ouça ' + nome + ' e bate-papo ao vivo: ' + url;

  if(mode === 'copy'){
    navigator.clipboard.writeText(url).then(()=>{
      const t = document.getElementById('toast');
      if(t){ t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
    });
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
  }
};

// ── VOLUME DUPLO + AUTO-DUCK ─────────────────────────────────────────────
window._radioAudioEl  = null;
window._voiceVolume   = 1.0;

// Expoe audio quando criado pelo loadRadio
const _origCreate = document.createElement.bind(document);
// Monitorar via MutationObserver
const _obs = new MutationObserver(()=>{
  const a = document.getElementById('radio-audio');
  if(a && !window._radioAudioEl){
    window._radioAudioEl = a;
    const vc = document.getElementById('vol-controls');
    if(vc) vc.style.display = 'flex';
    const vvr = document.getElementById('vol-voice-row');
    if(vvr) vvr.style.display = 'flex';
    a.volume = 0.8;
  }
});
_obs.observe(document.getElementById('p-player') || document.body, { childList:true, subtree:true });

// Sliders
document.getElementById('vol-radio')?.addEventListener('input', function(){
  const v = this.value / 100;
  document.getElementById('vol-radio-val').textContent = this.value + '%';
  if(window._radioAudioEl) window._radioAudioEl.volume = v;
});
document.getElementById('vol-voice')?.addEventListener('input', function(){
  window._voiceVolume = this.value / 100;
  document.getElementById('vol-voice-val').textContent = this.value + '%';
});

// Auto-duck: intercept audio play nos bubbles de voz
document.getElementById('chat-msgs')?.addEventListener('play', function(e){
  if(e.target.tagName === 'AUDIO' && window._radioAudioEl){
    window._radioAudioEl.volume = Math.max(0.05, (window._radioAudioEl.volume * 0.3));
    e.target.volume = window._voiceVolume;
    e.target.addEventListener('ended', function(){
      const slider = document.getElementById('vol-radio');
      window._radioAudioEl.volume = (slider ? slider.value / 100 : 0.8);
    }, { once: true });
  }
}, true);
</script>
