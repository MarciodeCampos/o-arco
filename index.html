<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050508">
<meta name="description" content="O VERBO — O Arco. Uma obra musical bíblica de 100 músicas. Da Glória Incriada ao Ômega.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="O ARCO">
<title>O VERBO — O Arco</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a5f2a;
    --ink: #050508;
    --ink2: #0a0a10;
    --ink3: #12121a;
    --surface: #1a1a25;
    --surface2: #22222f;
    --border: rgba(201,168,76,0.15);
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --arc-colors: #c9a84c, #a84c4c, #4c7aa8, #4ca874, #a84c8a, #a8894c, #6b4ca8, #4c98a8, #a86b4c, #c94c4c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ===== SPLASH ===== */
  #splash {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  #splash.hidden { opacity: 0; visibility: hidden; }
  
  .splash-symbol {
    font-size: 80px;
    color: var(--gold);
    animation: pulse-gold 2s ease-in-out infinite;
    line-height: 1;
  }
  .splash-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-align: center;
  }
  .splash-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(12px, 2.5vw, 18px);
    color: var(--gold-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }
  .splash-line {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: expand 1.5s ease-out;
  }
  .splash-caption {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
    font-style: italic;
  }
  .splash-loading {
    display: flex; gap: 6px;
  }
  .splash-loading span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .splash-loading span:nth-child(2) { animation-delay: 0.2s; }
  .splash-loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse-gold {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.95); }
  }
  @keyframes expand {
    from { width: 0; } to { width: 120px; }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* ===== LAYOUT ===== */
  #app {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    grid-template-areas:
      "topbar topbar"
      "sidebar main";
  }

  /* ===== TOPBAR ===== */
  #topbar {
    grid-area: topbar;
    background: rgba(5,5,8,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
  }
  .topbar-logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .topbar-sep { width: 1px; height: 24px; background: var(--border); }
  .topbar-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #menu-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 22px;
    padding: 6px;
  }

  /* ===== SIDEBAR ===== */
  #sidebar {
    grid-area: sidebar;
    background: var(--ink2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  .sidebar-section {
    padding: 16px 0 8px;
  }
  .sidebar-arc-header {
    padding: 8px 18px 6px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  .sidebar-arc-header:hover { color: var(--gold); }
  .arc-num-badge {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--ink);
    background: var(--gold-dim);
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .arc-name-text { flex: 1; }
  .arc-toggle { font-size: 10px; transition: transform 0.2s; }
  .arc-songs { overflow: hidden; }
  
  .song-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .song-item:hover { background: rgba(201,168,76,0.06); }
  .song-item.active { background: rgba(201,168,76,0.12); }
  .song-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
  }
  .song-thumb {
    width: 36px; height: 36px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .song-info { flex: 1; min-width: 0; }
  .song-num {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }
  .song-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-vers-count {
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* ===== MAIN AREA ===== */
  #main {
    grid-area: main;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* BG art */
  #bg-art {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(40px) brightness(0.25) saturate(0.8);
    transform: scale(1.1);
    transition: background-image 0.8s ease;
    z-index: 0;
  }
  #bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,5,8,0.3) 0%,
      rgba(5,5,8,0.1) 40%,
      rgba(5,5,8,0.6) 70%,
      rgba(5,5,8,0.95) 100%
    );
    z-index: 1;
  }

  /* Player */
  #player-wrap {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Song header */
  #song-header {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    padding: 32px 40px 20px;
    flex-shrink: 0;
  }
  #song-cover {
    width: 160px;
    height: 160px;
    border-radius: 8px;
    object-fit: cover;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    flex-shrink: 0;
    transition: opacity 0.4s;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  #song-cover:hover { opacity: 0.85; }
  
  #song-meta { flex: 1; min-width: 0; padding-top: 8px; }
  #song-arc-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #song-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 3vw, 36px);
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  #song-index-ref {
    font-size: 12px;
    color: var(--gold-dim);
    font-style: italic;
    margin-bottom: 12px;
  }
  #song-caption {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 500px;
    margin-bottom: 16px;
  }

  /* Version switcher */
  #version-switcher {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ver-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ver-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .ver-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
    font-weight: 600;
  }

  /* Audio controls */
  #audio-controls {
    padding: 0 40px 16px;
    flex-shrink: 0;
  }

  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  #progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: visible;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }
  #progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #progress-bar:hover #progress-fill::after { opacity: 1; }
  .time-label {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }
  #time-end { text-align: right; }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    padding: 6px;
    border-radius: 50%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .ctrl-btn.primary {
    width: 50px; height: 50px;
    font-size: 22px;
    background: var(--gold);
    color: var(--ink);
    border-radius: 50%;
    box-shadow: 0 4px 20px rgba(201,168,76,0.4);
  }
  .ctrl-btn.primary:hover {
    background: var(--gold-light);
    transform: scale(1.05);
    box-shadow: 0 4px 30px rgba(201,168,76,0.6);
  }
  #volume-wrap {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  #vol-icon { font-size: 14px; color: var(--text-dim); }
  #vol-slider {
    width: 80px;
    -webkit-appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }

  /* Lyrics */
  #lyrics-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 8px 40px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #lyrics-wrap::-webkit-scrollbar { width: 4px; }
  #lyrics-wrap::-webkit-scrollbar-thumb { background: var(--border); }

  #lyrics-content {
    max-width: 560px;
    font-size: 14px;
    line-height: 2;
    color: var(--text-dim);
    white-space: pre-wrap;
  }
  #lyrics-content .lyric-tag {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.3em;
    display: block;
    margin-top: 20px;
    margin-bottom: 4px;
    opacity: 0.8;
  }
  #lyrics-content .lyric-line { color: var(--text); }
  #lyrics-content .lyric-direction {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }
  #lyrics-content .lyric-empty { height: 8px; display: block; }

  /* ===== WELCOME SCREEN ===== */
  #welcome {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    gap: 16px;
  }
  #welcome.hidden { display: none; }
  #player-wrap.hidden { display: none; }

  .welcome-symbol { font-size: 64px; color: var(--gold); margin-bottom: 8px; }
  .welcome-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 900;
    color: var(--gold);
  }
  .welcome-desc {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 400px;
    line-height: 1.8;
  }
  .welcome-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 768px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "topbar"
        "main";
    }
    #sidebar {
      position: fixed;
      left: -100%;
      top: 56px;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      z-index: 200;
      transition: left 0.3s ease;
      box-shadow: 4px 0 30px rgba(0,0,0,0.8);
    }
    #sidebar.open { left: 0; }
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 56px 0 0;
      background: rgba(0,0,0,0.7);
      z-index: 199;
    }
    #sidebar-overlay.visible { display: block; }
    #menu-toggle { display: flex; }
    #song-header { padding: 20px 20px 12px; flex-direction: column; }
    #song-cover { width: 100%; height: 200px; }
    #audio-controls { padding: 0 20px 12px; }
    #lyrics-wrap { padding: 8px 20px 20px; }
    #song-title { font-size: 22px; }
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.4s ease forwards; }

  /* Playing indicator */
  .playing-indicator {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
    flex-shrink: 0;
  }
  .playing-indicator span {
    width: 2px;
    background: var(--gold);
    border-radius: 1px;
    animation: eq 0.8s ease-in-out infinite;
  }
  .playing-indicator span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .playing-indicator span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .playing-indicator span:nth-child(3) { height: 14px; animation-delay: 0.3s; }
  .playing-indicator span:nth-child(4) { height: 8px; animation-delay: 0.45s; }
  @keyframes eq {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  .playing-indicator.paused span { animation-play-state: paused; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-symbol">◈</div>
  <div class="splash-line"></div>
  <div class="splash-title">O VERBO</div>
  <div class="splash-sub">O Arco — 10 Movimentos</div>
  <div class="splash-caption">Da Glória Incriada ao Ômega.<br>100 músicas. Uma declaração eterna.</div>
  <div class="splash-loading"><span></span><span></span><span></span></div>
</div>

<div id="app">
  <!-- TOPBAR -->
  <header id="topbar">
    <button id="menu-toggle" aria-label="Menu">☰</button>
    <div class="topbar-logo">◈ O VERBO</div>
    <div class="topbar-sep"></div>
    <div class="topbar-subtitle">O Arco</div>
    <div class="topbar-right">
      <div class="playing-indicator paused" id="top-indicator">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav id="sidebar"></nav>
  <div id="sidebar-overlay"></div>

  <!-- MAIN -->
  <main id="main">
    <div id="bg-art"></div>
    <div id="bg-overlay"></div>

    <!-- WELCOME -->
    <div id="welcome">
      <div class="welcome-symbol">◈</div>
      <div class="welcome-title">O Arco</div>
      <p class="welcome-desc">Uma obra musical bíblica criada na Sexta-Feira Santa de 2026. Selecione uma música para começar.</p>
      <div class="welcome-stats">
        <div class="stat"><div class="stat-num">100</div><div class="stat-label">Músicas</div></div>
        <div class="stat"><div class="stat-num">10</div><div class="stat-label">Arcos</div></div>
        <div class="stat"><div class="stat-num">206</div><div class="stat-label">Versões</div></div>
      </div>
    </div>

    <!-- PLAYER -->
    <div id="player-wrap" class="hidden">
      <!-- Song Header -->
      <div id="song-header">
        <img id="song-cover" src="" alt="Capa" loading="lazy">
        <div id="song-meta">
          <div id="song-arc-label"></div>
          <div id="song-title"></div>
          <div id="song-index-ref"></div>
          <div id="song-caption"></div>
          <div id="version-switcher"></div>
        </div>
      </div>

      <!-- Audio Controls -->
      <div id="audio-controls">
        <div id="progress-wrap">
          <span class="time-label" id="time-cur">0:00</span>
          <div id="progress-bar">
            <div id="progress-fill"></div>
          </div>
          <span class="time-label" id="time-end">0:00</span>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn" id="btn-prev" title="Anterior">⏮</button>
          <button class="ctrl-btn" id="btn-back" title="-15s">↺</button>
          <button class="ctrl-btn primary" id="btn-play" title="Play/Pause">▶</button>
          <button class="ctrl-btn" id="btn-fwd" title="+15s">↷</button>
          <button class="ctrl-btn" id="btn-next" title="Próxima">⏭</button>
          <div id="volume-wrap">
            <span id="vol-icon">🔊</span>
            <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="0.85">
          </div>
        </div>
      </div>

      <!-- Lyrics -->
      <div id="lyrics-wrap">
        <div id="lyrics-content"></div>
      </div>
    </div>
  </main>
</div>

<audio id="audio-el" preload="auto"></audio>

<script>
// ============================================================

    const arcColor = getArcColor(arc.num);
    html += `<div class="sidebar-section">
      <div class="sidebar-arc-header" data-arc="${arc.num}">
        <span class="arc-num-badge" style="background:${arcColor}">A${arc.num.toString().padStart(2,'0')}</span>
        <span class="arc-name-text">${arc.name.replace(/^\d+\s*\|\s*/,'')}</span>
        <span class="arc-toggle" style="transform:rotate(${collapsed?'-90deg':'0deg'})">${collapsed?'▸':'▾'}</span>
      </div>
      <div class="arc-songs" style="display:${collapsed?'none':'block'}">`;
    
    arc.songNums.forEach(num => {
      const versions = songsByNum[num];
      const primary = versions[0];
      const isActive = currentSongNum === num;
      html += `<div class="song-item${isActive?' active':''}" data-num="${num}">
        <img class="song-thumb" src="${primary.image_url || primary.persona_image || ''}" alt="" loading="lazy" onerror="this.style.background='#1a1a25';this.removeAttribute('src')">
        <div class="song-info">
          <div class="song-num">◈ ${num.toString().padStart(3,'0')}</div>
          <div class="song-name">${primary.song_name}</div>
        </div>
        ${versions.length > 1 ? `<div class="song-vers-count">${versions.length}v</div>` : ''}
      </div>`;
    });
    
    html += `</div></div>`;
  });
  
  sidebar.innerHTML = html;
  
  // Events
  sidebar.querySelectorAll('.sidebar-arc-header').forEach(el => {
    el.addEventListener('click', () => {
      const an = +el.dataset.arc;
      arcCollapsed[an] = !arcCollapsed[an];
      buildSidebar();
    });
  });
  
  sidebar.querySelectorAll('.song-item').forEach(el => {
    el.addEventListener('click', () => {
      loadSong(+el.dataset.num, 0);
      closeMobileMenu();
    });
  });
}

function getArcColor(n) {
  const colors = ['#c9a84c','#a84c4c','#4c7aa8','#4ca874','#a84c8a','#a8894c','#6b4ca8','#4c98a8','#a86b4c','#c94c4c'];
  return colors[(n-1) % colors.length];
}

// ============================================================
// Player
// ============================================================
const audio = document.getElementById('audio-el');

function loadSong(songNum, verIdx) {
  currentSongNum = songNum;
  currentVerIdx = verIdx;
  
  const versions = songsByNum[songNum];
  const clip = versions[verIdx];
  
  // Background art
  const img = clip.image_url || clip.persona_image || '';
  document.getElementById('bg-art').style.backgroundImage = `url(${img})`;
  
  // Cover
  document.getElementById('song-cover').src = img;
  
  // Meta
  const arcNum = clip.arc_num;
  document.getElementById('song-arc-label').textContent = `Arco ${arcNum.toString().padStart(2,'0')} — ${(clip.arc_name || '').replace(/^\d+\s*\|\s*/,'').replace(/\d+\s*\|\s*/,'')}`;
  document.getElementById('song-title').textContent = `◈ ${songNum.toString().padStart(3,'0')} | ${clip.song_name}`;
  document.getElementById('song-index-ref').textContent = clip.index_ref || '';
  document.getElementById('song-caption').textContent = clip.caption || '';
  
  // Version switcher
  const vsw = document.getElementById('version-switcher');
  vsw.innerHTML = versions.map((v, i) => 
    `<button class="ver-btn${i===verIdx?' active':''}" data-ver="${i}">
      Versão ${i+1}${v.batch_index !== undefined ? ` (v${v.batch_index})` : ''}
    </button>`
  ).join('');
  vsw.querySelectorAll('.ver-btn').forEach(btn => {
    btn.addEventListener('click', () => loadSong(songNum, +btn.dataset.ver));
  });
  
  // Lyrics
  renderLyrics(clip.prompt || '');
  
  // Audio
  audio.src = clip.audio_url;
  audio.volume = document.getElementById('vol-slider').value;
  audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(()=>{});
  
  // Show player
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('player-wrap').classList.remove('hidden');
  document.getElementById('player-wrap').classList.add('fade-in');
  
  // Update sidebar
  buildSidebar();
  scrollSidebarToActive();
}

function renderLyrics(prompt) {
  const el = document.getElementById('lyrics-content');
  if (!prompt) { el.innerHTML = '<span style="color:var(--text-dim);font-style:italic">Sem letra disponível.</span>'; return; }
  
  // Clean title/index/arc header
  let text = prompt
    .replace(/\[Title:[^\]]+\]/g, '')
    .replace(/\[Index:[^\]]+\]/g, '')
    .replace(/\[Arc:[^\]]+\]/g, '')
    .trim();
  
  const lines = text.split('\n');
  let html = '';
  
  lines.forEach(line => {
    line = line.trim();
    if (!line) { html += '<span class="lyric-empty"></span>'; return; }
    if (/^\[.+\]$/.test(line)) {
      html += `<span class="lyric-tag">${line}</span>`;
    } else if (/^\(.+\)$/.test(line)) {
      html += `<span class="lyric-direction">${line}</span>\n`;
    } else {
      html += `<span class="lyric-line">${escapeHtml(line)}</span>\n`;
    }
  });
  
  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollSidebarToActive() {
  const active = document.querySelector('.song-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ============================================================
// Audio events
// ============================================================
audio.addEventListener('timeupdate', () => {
  const p = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width = p + '%';
  document.getElementById('time-cur').textContent = fmtTime(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-end').textContent = fmtTime(audio.duration);
});

audio.addEventListener('ended', () => {
  // Auto-advance
  const idx = uniqueSongs.findIndex(s => s.num === currentSongNum);
  if (idx < uniqueSongs.length - 1) {
    loadSong(uniqueSongs[idx+1].num, 0);
  } else {
    isPlaying = false; updatePlayBtn();
  }
});

audio.addEventListener('play', () => { isPlaying = true; updatePlayBtn(); });
audio.addEventListener('pause', () => { isPlaying = false; updatePlayBtn(); });

function updatePlayBtn() {
  document.getElementById('btn-play').textContent = isPlaying ? '⏸' : '▶';
  const ind = document.getElementById('top-indicator');
  ind.classList.toggle('paused', !isPlaying);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// Progress bar click
document.getElementById('progress-bar').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
});

// Controls
document.getElementById('btn-play').addEventListener('click', () => {
  if (!audio.src) return;
  isPlaying ? audio.pause() : audio.play();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const idx = uniqueSongs.findIndex(s => s.num === currentSongNum);
  if (idx > 0) loadSong(uniqueSongs[idx-1].num, 0);
});

document.getElementById('btn-next').addEventListener('click', () => {
  const idx = uniqueSongs.findIndex(s => s.num === currentSongNum);
  if (idx < uniqueSongs.length - 1) loadSong(uniqueSongs[idx+1].num, 0);
});

document.getElementById('btn-back').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime-15); });
document.getElementById('btn-fwd').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime+15); });

document.getElementById('vol-slider').addEventListener('input', e => {
  audio.volume = e.target.value;
  document.getElementById('vol-icon').textContent = e.target.value > 0.5 ? '🔊' : e.target.value > 0 ? '🔉' : '🔇';
});

// Song cover → open on Suno
document.getElementById('song-cover').addEventListener('click', () => {
  if (currentSongNum) {
    const clip = songsByNum[currentSongNum][currentVerIdx];
    window.open(`https://suno.com/song/${clip.id}`, '_blank');
  }
});

// Mobile menu
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('visible');
});

function closeMobileMenu() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}
document.getElementById('sidebar-overlay').addEventListener('click', closeMobileMenu);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code === 'ArrowRight') document.getElementById('btn-next').click();
  if (e.code === 'ArrowLeft') document.getElementById('btn-prev').click();
});

// ============================================================
// Init
// ============================================================
function init() {
  buildSidebar();
  
  // Hide splash
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
  }, 2200);
  
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

init();
</script>
</body>
</html>
